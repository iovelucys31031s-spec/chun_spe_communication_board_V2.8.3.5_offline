            return jamoStr; 
        };

        const getFilteredVoices = (langPrefix, voiceList) => {
            if (!voiceList) return [];
            if (langPrefix === 'zh') return voiceList.filter(v => v.lang.toLowerCase().includes('zh') || v.lang.toLowerCase().includes('cmn'));
            return voiceList.filter(v => v.lang.toLowerCase().startsWith(langPrefix));
        };

        const ZHUYIN_CATS = {
            C: ['ㄅ', 'ㄆ', 'ㄇ', 'ㄈ', 'ㄉ', 'ㄊ', 'ㄋ', 'ㄌ', 'ㄍ', 'ㄎ', 'ㄏ', 'ㄐ', 'ㄑ', 'ㄒ', 'ㄓ', 'ㄔ', 'ㄕ', 'ㄖ', 'ㄗ', 'ㄘ', 'ㄙ'], 
            M: ['ㄧ', 'ㄨ', 'ㄩ'], 
            V: ['ㄚ', 'ㄛ', 'ㄜ', 'ㄝ', 'ㄞ', 'ㄟ', 'ㄠ', 'ㄡ', 'ㄢ', 'ㄣ', 'ㄤ', 'ㄥ', 'ㄦ'], 
            T: ['一聲', 'ˊ', 'ˇ', 'ˋ', '˙'] 
        };

        const PUNCTUATIONS = ['，', '。', '？'];
        const PUNCT_NAMES = {'，': '逗號', '。': '句號', '？': '問號'};

        const LANG_SETTINGS = {
            zhuyin: { label: 'ㄅㄆㄇ', name: '中文', testText: '今天天氣很好', prefix: 'zh' },
            english: { label: 'ABC', name: '英文', testText: 'This is an apple', prefix: 'en' },
            number: { label: '123', name: '數字', testText: '123456', prefix: 'zh' }
        };

        const KEYBOARD_LAYOUTS = {
            zhuyin: [
                ['ㄅ', 'ㄉ', 'ˇ', 'ˋ', 'ㄓ', 'ˊ', '˙', 'ㄚ', 'ㄞ', 'ㄢ', 'ㄦ'],
                ['ㄆ', 'ㄊ', 'ㄍ', 'ㄐ', 'ㄔ', 'ㄗ', 'ㄧ', 'ㄛ', 'ㄟ', 'ㄣ', '，'],
                ['ㄇ', 'ㄋ', 'ㄎ', 'ㄑ', 'ㄕ', 'ㄘ', 'ㄨ', 'ㄜ', 'ㄠ', 'ㄤ', '。'],
                ['ㄈ', 'ㄌ', 'ㄏ', 'ㄒ', 'ㄖ', 'ㄙ', 'ㄩ', 'ㄝ', 'ㄡ', 'ㄥ', '？']
            ],
            english: [
                ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
                ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],

            number: [
                ['1', '2', '3'],
                ['4', '5', '6'],
                ['7', '8', '9'],
                ['', '0', '']

        };

        const THEMES = {
            original: {
                name: '經典原版', bg: 'bg-[#e0f7fa]', text: 'text-gray-900', displayBg: 'bg-white',
                displayBorder: 'border-2 border-[#b2ebf2]', keyBg: 'bg-white', keyText: 'text-gray-900',
                keyBorder: 'border border-gray-300 shadow-sm', keyActive: 'active:bg-[#b2ebf2] active:scale-95',
            },
            soft: {
                name: '柔和粉藍', bg: 'bg-pink-50', text: 'text-slate-700', displayBg: 'bg-white',

                keyBorder: 'border-2 border-blue-200', keyActive: 'active:bg-blue-200 active:scale-95',

        function App() {
        const [view, setView] = useState('keyboard');
        const [theme, setTheme] = useState('original'); 
        const [language, setLanguage] = useState('zhuyin');
        const [enabledLanguages, setEnabledLanguages] = useState(['zhuyin', 'english', 'number']);
        
        const [completedInputs, setCompletedInputs] = useState([]);
        const [currentSyllable, setCurrentSyllable] = useState([]);

        // --- 核心防呆：安裝與系統狀態 ---
        const [setupState, setSetupState] = useState(0); 
        const [updateProgress, setUpdateProgress] = useState(0);
        const [installPrompt, setInstallPrompt] = useState(null);
        const [isInstalling, setIsInstalling] = useState(false);

        const [settingShowSetup, setSettingShowSetup] = useState(true);

        useEffect(() => {
            const handleResize = () => {
                const width = window.innerWidth;
                if (width < 640) setDeviceType('mobile');
                else if (width < 1024) setDeviceType('tablet');
                else setDeviceType('desktop');
            };
            handleResize();
            window.addEventListener('resize', handleResize);
            return () => window.removeEventListener('resize', handleResize);
        }, []);

        // --- PWA 即時偵測安裝狀態與攔截事件 ---
        useEffect(() => {
            // 1. 偵測目前是否用 APP 打開
            if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
                setIsInstalledApp(true);
            }

            // 2. 攔截系統發出的「可以安裝」訊號
            const handleBeforeInstallPrompt = (e) => {
                e.preventDefault();
                setInstallPrompt(e);
            };

            // 3. 監聽「安裝成功」的瞬間
            const handleAppInstalled = () => {
                setIsJustInstalled(true);
                setInstallPrompt(null);
            };

            window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            window.addEventListener('appinstalled', handleAppInstalled);

            return () => {
                window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                window.removeEventListener('appinstalled', handleAppInstalled);
            };
        }, []);

        const handleInstall = async () => {
            if (!installPrompt) return;
            setIsInstalling(true);
            try {
                installPrompt.prompt();
                const { outcome } = await installPrompt.userChoice;
                if (outcome === 'accepted') {
                    setInstallPrompt(null);
                    setIsJustInstalled(true);
                }
            } catch (err) {
                console.error("安裝發生錯誤", err);
            } finally {
                setIsInstalling(false);
            }
        };

        // --- 每次開啟的檢查與載入 UI 流程 ---
        useEffect(() => {
            const shouldHide = localStorage.getItem('aac_show_setup') === 'false';
            setSettingShowSetup(!shouldHide);
            setDontShowAgain(shouldHide);
            
            let readyTimer;

            if (!shouldHide) {
                setSetupState(1); // 檢查中
                readyTimer = setTimeout(() => {
                    setSetupState(2); // 準備就緒
                }, 2000);
            }

            // 若有更新，強制無視設定跳出進度條
            const handleUpdateStarted = () => {
                clearTimeout(readyTimer);
                setSetupState(3); // 強制更新下載中
                setUpdateProgress(0);
            };

            const handleInstalled = () => {
                clearTimeout(readyTimer);
                setUpdateProgress(100);
                setTimeout(() => {
                    setSetupState(2);
                }, 500);
            };

            window.addEventListener('pwa-update-started', handleUpdateStarted);
            window.addEventListener('pwa-installed', handleInstalled);

            return () => {
                clearTimeout(readyTimer);
                window.removeEventListener('pwa-update-started', handleUpdateStarted);
                window.removeEventListener('pwa-installed', handleInstalled);
            };
        }, []);

        useEffect(() => {
            if (setupState === 3 && updateProgress < 90) {
                const timer = setTimeout(() => setUpdateProgress(p => p + 10), 400);
                return () => clearTimeout(timer);
            }
        }, [setupState, updateProgress]);

        const handleStartUsing = () => {
            localStorage.setItem('aac_show_setup', dontShowAgain ? 'false' : 'true');
            setSettingShowSetup(!dontShowAgain);
            setSetupState(0);
        };

        const toggleSettingShowSetup = () => {
            const nextVal = !settingShowSetup;
            setSettingShowSetup(nextVal);
            setDontShowAgain(!nextVal);
            localStorage.setItem('aac_show_setup', nextVal ? 'true' : 'false');
        };

        const keyboardMax = deviceType === 'mobile' ? 30 : deviceType === 'tablet' ? 36 : 40;

        useEffect(() => {
            if (pendingKeyboardFontSize > keyboardMax) {
                setPendingKeyboardFontSize(keyboardMax);
            }
        }, [deviceType, keyboardMax]);
        
        useEffect(() => {
            const loadVoices = () => {
                let availableVoices = window.speechSynthesis.getVoices();
                if (availableVoices.length === 0) return;
                setVoices(availableVoices);
                setVoiceSettings(prev => {
                    const newSettings = { ...prev };
                    const getDef = (langKey, prefix) => {
                        const list = getFilteredVoices(prefix, availableVoices);
                        if (list.length === 0) return '';
                        return list[0].voiceURI;
                    };
                    if (!newSettings.zhuyin) newSettings.zhuyin = getDef('zhuyin', 'zh');
                    if (!newSettings.english) newSettings.english = getDef('english', 'en');
                    return newSettings;
                });
            };
            loadVoices();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = loadVoices;
            }
        }, []);

        const speak = (textToSpeak) => {
            if (!textToSpeak) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            const targetVoiceURI = voiceSettings[language === 'number' ? 'zhuyin' : language];
            let selectedVoice = voices.find(v => v.voiceURI === targetVoiceURI);
            
            if (selectedVoice) {
                utterance.voice = selectedVoice;
                utterance.lang = selectedVoice.lang; 
            } else {
                utterance.lang = language === 'english' ? 'en-US' : 'zh-TW';
            }
            utterance.rate = ttsRate;
            window.speechSynthesis.speak(utterance);
        };

        const handlePlayVoice = () => {
            if (language !== 'zhuyin') return;
            const allSyllables = [...completedInputs];
            if (currentSyllable.length > 0) allSyllables.push(currentSyllable.join(''));
            const fullText = allSyllables.map(s => PUNCTUATIONS.includes(s) ? s : getHanziFromZhuyin(s)).join('');
            speak(fullText.trim());
        };

        // --- 核心防呆：注音字典鎖定邏輯 ---
        const getAvailableKeys = useMemo(() => {
            if (language !== 'zhuyin') return null;
            const validBases = Object.keys(ZHUYIN_DICT);
            let validKeys = [];

            if (currentSyllable.length === 0) {
                const starters = new Set(validBases.map(b => b.charAt(0)));
                validKeys = Array.from(starters);
                validKeys.push(...PUNCTUATIONS);
            } else {
                const currentStr = currentSyllable.join('');
                const nextChars = new Set();
                validBases.forEach(base => {
                    if (base.startsWith(currentStr) && base.length > currentStr.length) {
                        nextChars.add(base.charAt(currentStr.length));
                    }
                });
                validKeys = Array.from(nextChars);
                if (validBases.includes(currentStr)) {
                    validKeys.push(...ZHUYIN_CATS.T);
                }
            }
            return validKeys;
        }, [currentSyllable, language]);

        const handleKeyPress = (char) => {
            let textToSpeak = char;

            if (language === 'zhuyin' && PUNCTUATIONS.includes(char)) {
                speak(PUNCT_NAMES[char] || char);
                const newCompleted = [...completedInputs];
                if (currentSyllable.length > 0) newCompleted.push(currentSyllable.join(''));
                newCompleted.push(char);
                setCompletedInputs(newCompleted);
                setCurrentSyllable([]);
                return;
            }

            if (language === 'zhuyin') {
                if (ZHUYIN_CATS.T.includes(char)) {
                    let toneMark = char === '一聲' ? '' : char;
                    textToSpeak = getHanziFromZhuyin([...currentSyllable, toneMark].join('')); 
                } else if (char === 'SPACE') {
                    textToSpeak = '空格';
                } else {
                    textToSpeak = getHanziFromZhuyin(char);
                }
            } else {
                if (char === 'SPACE') textToSpeak = 'space';
            }
            
            speak(textToSpeak);

            if (language === 'zhuyin') {
                if (ZHUYIN_CATS.T.includes(char)) {
                    let toneMark = char === '一聲' ? '' : char;
                    setCompletedInputs([...completedInputs, [...currentSyllable, toneMark].join('')]);
                    setCurrentSyllable([]);
                } else {
                    setCurrentSyllable([...currentSyllable, char]);
                }
            } else {
                if (char === 'SPACE') {
                    setCompletedInputs([...completedInputs, currentSyllable.join('') + ' ']);
                    setCurrentSyllable([]);
                } else {
                    setCurrentSyllable([...currentSyllable, char]);
                }
            }
        };

        const handleBackspace = () => {
            if (currentSyllable.length > 0) {
                setCurrentSyllable(prev => prev.slice(0, -1));
            } else if (completedInputs.length > 0) {
                const newInputs = [...completedInputs];
                const lastCompleted = newInputs.pop().trim();
                if (PUNCTUATIONS.includes(lastCompleted)) {
                    setCompletedInputs(newInputs);
                    setCurrentSyllable([]);
                } else {
                    const chars = lastCompleted.split('');
                    const lastChar = chars[chars.length - 1];
                    if (['ˊ', 'ˇ', 'ˋ', '˙'].includes(lastChar)) chars.pop();
                    setCompletedInputs(newInputs);
                    setCurrentSyllable(chars);
                }
            }
        };

        const handleClear = () => {
            setCompletedInputs([]);
            setCurrentSyllable([]);
        };

        const currentTheme = THEMES[theme];
        const disabledStyle = {

                                        <button onClick={() => speak("安裝到桌面怎麼做？方法一：一鍵安裝。點擊畫面上的按鈕。下載需要幾秒鐘。下載完，去手機的所有應用程式裡面找，把它拉到桌面上。方法二：加入主畫面。按瀏覽器右上角或下方的分享選單，選加入主畫面。它會馬上在桌面建立捷徑。", 'zhuyin')} className="px-2 py-1 bg-emerald-600 text-white rounded text-[10px] font-bold">🔊 朗讀</button>

                                    <p className="text-gray-600 leading-relaxed">
                                        如果您按過手機的「清理空間」或是清除了瀏覽器的資料，存好的溝通板就會被不小心刪除。<br/>
                                        👉 <strong>解決方法：</strong> 回家連上 WiFi 或網路，重新打開網頁一次讓它下載，就能再次帶出門使用了！
                                    </p>
                                </div>
                                
                                <div className="border-t border-gray-100 pt-5">
                                    <h4 className="font-bold text-gray-800 text-base mb-3 border-l-4 border-purple-500 pl-2 flex justify-between items-center">
                                        四、換新手機怎麼辦？
                                        <button onClick={() => speak("換新手機怎麼辦？在新手機上輸入網址，重新做一次安裝步驟即可。", 'zhuyin')} className="px-2 py-1 bg-emerald-600 text-white rounded text-[10px] font-bold">🔊 朗讀</button>
                                    </h4>
                                    <p className="text-gray-600 leading-relaxed">在新手機的瀏覽器上輸入老師給的網址，重新做一次安裝步驟就可以囉！</p>
                                </div>
                            </div>

                            <button onClick={() => { window.speechSynthesis.cancel(); setIsQaOpen(false); }} className="mt-6 w-full bg-amber-500 hover:bg-amber-600 text-white py-3 rounded-xl font-black transition-colors shadow-lg">
                                關閉 Q&A
                            </button>
                        </div>
                    </div>
                )}

                {/* 指南彈窗 (省略語音內容以節省空間) */}
                {isGuideOpen && (
                    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 animate-fade-in">
                        <div className="bg-white rounded-2xl max-w-3xl w-full p-6 max-h-[85vh] overflow-y-auto shadow-xl relative border-4 border-teal-200 text-gray-600 leading-relaxed">
                            <h3 className="text-xl font-black text-teal-600 mb-4 border-b border-gray-100 pb-2">📖 新手指南與功能說明</h3>
                            <p>這裡是功能設定說明的區域...</p>
                            <button onClick={() => setIsGuideOpen(false)} className="mt-6 w-full bg-teal-600 text-white py-3 rounded-xl font-black">了解，開始使用</button>
                        </div>
                    </div>
                )}

                <div className="flex-1 overflow-y-auto space-y-6 landscape:space-y-3 pb-10 landscape:pb-4 pr-2 mt-2 md:mt-0">
                
                {/* 開關提示設定 */}
                <section className="bg-white/60 p-5 landscape:p-3 rounded-2xl landscape:rounded-xl shadow-sm mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div>
                        <h3 className="text-xl font-bold text-gray-800">每次開啟時顯示「系統檢查」畫面</h3>
                        <p className="text-sm text-gray-600 mt-1">開啟後，每次打開網頁都會自動檢查離線狀態。</p>
                    </div>
                    <button 
                        onClick={toggleSettingShowSetup}
                        className={`w-full sm:w-auto px-6 py-3 rounded-xl font-black text-white shadow-md active:scale-95 transition-all ${settingShowSetup ? 'bg-emerald-500 hover:bg-emerald-600' : 'bg-gray-400 hover:bg-gray-500'}`}
                    >
                        {settingShowSetup ? '目前狀態：開' : '目前狀態：關'}
                    </button>
                </section>

                {/* 智慧安裝區塊 */}
                <section className="bg-blue-50 border-2 border-blue-400 p-5 landscape:p-3 rounded-2xl shadow-sm mb-6 flex flex-col sm:flex-row items-center justify-between gap-4">
                    <div className="w-full sm:w-auto text-left">
                        <h3 className="text-xl font-black text-blue-800 mb-1">將溝通板安裝至手機</h3>
                        <p className="text-sm text-blue-600">下載後，未來免開瀏覽器即可離線秒開！</p>
                    </div>
                    <InstallButtonUI />
                </section>

                {/* 介面設定 */}
                <section className="bg-white/60 p-5 landscape:p-3 rounded-2xl landscape:rounded-xl shadow-sm">
                    <h3 className="text-xl font-bold mb-4 border-b border-black/10 pb-2">字體與順序設定</h3>
                    
                    <div className="flex flex-col gap-4">
                        <div className="flex justify-between items-center">
                            <span className="font-bold">顯示區字體：</span>
                            <div className="flex items-center gap-2">
                                <input type="range" min="10" max="80" step="2" value={pendingFontSize} onChange={(e) => setPendingFontSize(parseInt(e.target.value))} className="w-24" />
                                <span className="font-black w-8">{pendingFontSize}</span>
                                <button onClick={() => setDisplayFontSize(pendingFontSize)} className="bg-blue-600 text-white px-3 py-1 rounded-lg text-sm">確認</button>
                            </div>
                        </div>

                        <div className="flex justify-between items-center">
                            <span className="font-bold">鍵盤區字體：</span>
                            <div className="flex items-center gap-2">
                                <input type="range" min="14" max="30" step="1" value={pendingKeyboardFontSize} onChange={(e) => setPendingKeyboardFontSize(parseInt(e.target.value))} className="w-24" />
                                <span className="font-black w-8">{pendingKeyboardFontSize}</span>
                                <button onClick={() => setKeyboardFontSize(pendingKeyboardFontSize)} className="bg-blue-600 text-white px-3 py-1 rounded-lg text-sm">確認</button>
                            </div>
                        </div>
                    </div>
                </section>

                </div>
            </div>
            );
        }

        const BIG_TONES = ['ˇ', 'ˋ', 'ˊ', '˙'];
        const spaceChar = language === 'zhuyin' ? '一聲' : 'SPACE';
        const isSpaceEnabled = !getAvailableKeys || getAvailableKeys.includes(spaceChar);

        return (
            <div className={`h-[100dvh] w-full flex flex-col ${currentTheme.bg} overflow-hidden select-none pb-2 md:pb-4 landscape:pb-1 relative`}>
            
            {/* 核心升級：防呆全螢幕檢查與更新畫面 */}
            {setupState > 0 && (
                <div className="fixed inset-0 bg-black/70 z-[9999] flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-3xl p-6 md:p-8 max-w-sm w-full shadow-2xl flex flex-col items-center text-center border-4 border-[#92A8D1]">
                        
                        {/* 狀態1：正在檢查中 (2秒動畫) */}
                        {setupState === 1 && (
                            <>
                                <div className="w-16 h-16 border-8 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-6"></div>
                                <h3 className="text-xl md:text-2xl font-black text-gray-800 mb-3">🔍 系統檢查中...</h3>
                                <p className="text-base text-gray-600 mb-2 leading-relaxed">
                                    正在為您檢查離線檔案。<br/><span className="text-blue-600 font-bold">請稍候幾秒鐘...</span>
                                </p>
                            </>
                        )}

                        {/* 狀態3：強制更新下載中 (出現進度條) */}
                        {setupState === 3 && (
                            <>
                                <div className="w-full bg-gray-200 rounded-full h-4 mb-4 overflow-hidden relative">
                                    <div className="bg-blue-600 h-4 rounded-full transition-all duration-300" style={{ width: `${updateProgress}%` }}></div>
                                </div>
                                <h3 className="text-xl md:text-2xl font-black text-blue-800 mb-3">系統更新中，請勿關閉</h3>
                                <p className="text-base text-gray-600 mb-2 leading-relaxed">
                                    發現新版本！正在下載最新的檔案...<br/><span className="text-blue-600 font-bold">請保持網路連線。</span>
                                </p>
                            </>
                        )}

                        {/* 狀態2：就緒與安裝提示 */}
                        {setupState === 2 && (
                            <>
                                <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-4 shadow-inner">
                                    <span className="text-3xl">✅</span>
                                </div>
                                <h3 className="text-xl md:text-2xl font-black text-gray-800 mb-3">準備就緒</h3>
                                <p className="text-base text-gray-600 mb-4 leading-relaxed">
                                    所有檔案都已經準備好了。<br/>現在出門沒網路也能正常使用囉！
                                </p>

                                <div className="w-full bg-blue-50 border border-blue-200 rounded-xl p-4 mb-4 text-left flex flex-col gap-2">
                                    <p className="text-sm text-blue-800 font-black mb-1">💡 建議安裝到桌面：</p>
                                    <InstallButtonUI />
                                </div>

                                <label className="flex items-center justify-center gap-2 mb-4 text-sm text-gray-600 font-bold cursor-pointer select-none">
                                    <input 
                                        type="checkbox" 
                                        checked={dontShowAgain}
                                        onChange={(e) => setDontShowAgain(e.target.checked)}
                                        className="w-5 h-5 rounded text-blue-600 cursor-pointer"
                                    />
                                    以後打開不要再顯示此檢查畫面
                                </label>

                                <button 
                                    onClick={handleStartUsing}
                                    className="w-full bg-[#92A8D1] hover:bg-blue-500 text-white font-black text-lg py-3 rounded-xl shadow-md active:scale-95 transition-all"
                                >
                                    知道了，開始使用
                                </button>
                            </>
                        )}
                    </div>
                </div>
            )}

            {/* 前台鍵盤 UI (維持不變) */}
            <div className="h-[40%] landscape:h-[35%] w-full flex gap-1 p-2 md:p-4 landscape:p-1 min-h-0 shrink-0">
                <button onClick={handlePlayVoice} className="w-20 md:w-28 landscape:w-24 flex flex-col items-center justify-center bg-emerald-500 text-white rounded-xl md:rounded-2xl landscape:rounded-lg shadow-md active:scale-95 transition-transform">
                <Play className="w-10 h-10 md:w-12 md:h-12 landscape:w-8 landscape:h-8 fill-current" />
                <span className="text-sm md:text-lg landscape:text-sm font-bold mt-2 landscape:mt-1">播音</span>
                </button>

                <div className={`flex-1 rounded-xl md:rounded-2xl landscape:rounded-lg p-4 landscape:p-3 overflow-y-auto ${currentTheme.displayBg} ${currentTheme.displayBorder} shadow-inner flex items-start content-start`}>
                <div className={`font-bold tracking-widest flex flex-wrap gap-x-2 gap-y-1 ${currentTheme.text} break-words w-full`} style={{ fontSize: `${displayFontSize}px`, lineHeight: '1.4' }}>
                    {completedInputs.map((s, i) => <span key={i}>{s}</span>)}
                    <span className="border-b-[0.1em] border-current animate-pulse min-w-[0.5em] h-[1.2em]">
                        {currentSyllable.join('')}
                    </span>
                </div>
                </div>

                <div className="w-20 md:w-28 landscape:w-24 flex flex-col gap-2 landscape:gap-1">
                    <button onClick={handleBackspace} className="flex-1 bg-amber-500 text-white rounded-xl shadow-md active:scale-95 flex flex-col items-center justify-center"><Delete className="w-8 h-8" /><span className="text-xs font-bold">倒退</span></button>
                    <button onClick={handleClear} className="flex-1 bg-rose-500 text-white rounded-xl shadow-md active:scale-95 flex flex-col items-center justify-center"><Trash2 className="w-8 h-8" /><span className="text-xs font-bold">清空</span></button>
                </div>
            </div>

            <div className="flex-1 flex flex-col px-1 gap-1 justify-center overflow-hidden">
                {KEYBOARD_LAYOUTS.zhuyin.map((row, rowIndex) => (
                <div key={rowIndex} className="flex-1 flex gap-1 justify-center">
                    {row.map((char, colIndex) => {
                    if (char === '') return <div key={`${rowIndex}-${colIndex}`} className="flex-1"></div>;
                    const isEnabled = !getAvailableKeys || getAvailableKeys.includes(char);
                    const isBigTone = BIG_TONES.includes(char);
                    const isPunctuation = PUNCTUATIONS.includes(char);
                    return (
                        <button
                        key={`${rowIndex}-${colIndex}`}
                        onClick={() => isEnabled && handleKeyPress(char)}
                        style={!isEnabled ? disabledStyle : (!isBigTone && !isPunctuation ? { fontSize: `${keyboardFontSize}px` } : {})}
                        className={`flex-1 rounded-xl shadow flex items-center justify-center ${isEnabled ? `${currentTheme.keyBg} ${currentTheme.keyText} ${currentTheme.keyBorder} ${currentTheme.keyActive}` : ''}`}
                        >
                        {isBigTone ? <ToneIcon char={char} className="w-[50%] h-[50%]" /> : <span className="font-extrabold">{char}</span>}
                        </button>
                    );
                    })}
                </div>
                ))}
            </div>

            <div className="h-14 flex justify-between gap-2 px-2 mt-1 shrink-0">
                <button className="flex-[1.5] bg-blue-400 text-white rounded-xl flex flex-col items-center justify-center text-xs font-bold shadow-md"><Globe className="w-5 h-5"/>ㄅㄆㄇ</button>
                <button onClick={() => isSpaceEnabled && handleKeyPress(spaceChar)} style={!isSpaceEnabled ? disabledStyle : {}} className={`flex-[5] rounded-xl font-bold tracking-widest text-xl shadow-md ${isSpaceEnabled ? `${currentTheme.keyBg} ${currentTheme.keyText}` : ''}`}>一聲</button>
                <button onClick={() => document.documentElement.requestFullscreen()} className="flex-[1.5] bg-amber-600 text-white rounded-xl flex flex-col items-center justify-center text-xs font-bold shadow-md"><Maximize className="w-5 h-5"/>全螢幕</button>
                <button onClick={() => setView('settings')} className="flex-[1.5] bg-slate-500 text-white rounded-xl flex flex-col items-center justify-center text-xs font-bold shadow-md"><Settings className="w-5 h-5"/>設定</button>
            </div>

            </div>
        );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').then(reg => {
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                window.dispatchEvent(new CustomEvent('pwa-update-started'));
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed') {
                    window.dispatchEvent(new CustomEvent('pwa-installed'));
                  }
                });
              });
            });
        });
      }
    </script>
</body>
</html>
